<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buscador de Cartas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="topbar">
    <div class="topbar-mark">
      <span class="topbar-mark-glyph">&#9670;</span>
      <div>
        <h1>Explorador de Cartas</h1>
        <p class="topbar-sub">Dossier de unidades &mdash; búsqueda y filtrado táctico</p>
      </div>
    </div>
    <div style="display: flex; flex-direction: column; gap: 0.75rem;">
      <button class="mobile-filter-toggle" id="mobileFilterToggle" type="button" aria-expanded="false" aria-controls="filterSidebar">
        Filtros
      </button>
      <button class="prompt" id="copyPromptBtn" type="button">
        Copiar Prompt
      </button>
    </div>
    <script>
      document.addEventListener("DOMContentLoaded", function() {
        const copyBtn = document.getElementById('copyPromptBtn');
        copyBtn.addEventListener('click', function() {
          // Línea precisa del prompt.txt 1-42
          const prompt = `You are an AI that receives a fantasy card image. 
Your task is to:
1. Perform OCR to extract all visible text from the card image.
2. Identify and classify the following fields:
   - card_name: The main title of the card (top, bold font).
   - ability_name: The highlighted ability name (usually below the card name).
   - ability_description: The long text describing the ability.

3. Analyze the ability name and description to infer gameplay attributes:
   - role: Card’s role (DPS, healer, support, tank, etc.).
   - role_rating: A rating (e.g., 7/10) with a short explanation.
   - caps: List the caps/limits mentioned in the description or shown in gray containers.
   - revive: If the card revives, describe how, conditions, and benefits. If not, set to null.
   - status_effects: States applied (bleed, poison, stun, etc.), how they are applied, scaling potential. If none, set to null.
   - debuffs: Enemy debuffs (cancel, reduce, weaken, etc.). If none, set to null.
   - counters: Counter mechanics (block, dodge, reflect, etc.). If none, set to null.
   - buffs: Buffs to allies or self (stats, family buffs, etc.). If none, set to null.
   - fusion: Fusion mode, conditions, and effects. If none, set to null.
   - summons: Summons units, describe what, how, and conditions. If none, set to null.

4. Output everything in valid JSON format. 
All fields must exist. If a field is not applicable, set it to null.

Example output:

{
  "card_name": "Awakened Golden Vampire",
  "ability_name": "ZA WARUDO!!!",
  "ability_description": "When attacked: 35% chance to cancel the attack and time stop for 1 turn...",
  "role": "DPS",
  "role_rating": "8/10 - Strong burst damage with time stop and bleed scaling",
  "caps": ["One Per Party", "Revive Limit", "Effect Cap", "Time Stop"],
  "revive": "On first death, revives at 65% HP in the body of the first enemy killed, gaining 50% of their DMG",
  "status_effects": "Applies 2-turn bleed equal to 50% of DMG dealt during time stop",
  "debuffs": "Cancels enemy attack and stops time, preventing actions",
  "counters": "Chance to cancel incoming attack (35%, increases by 10% on failure)",
  "buffs": null,
  "fusion": null,
  "summons": null
}

Keep this prompt in mind for the rest of the conversation, and apply its rules when responding to all the images I send you.`;
          navigator.clipboard.writeText(prompt).then(function() {
            copyBtn.textContent = "¡Prompt copiado!";
            setTimeout(() => {
              copyBtn.textContent = "Copiar Prompt";
            }, 2000);
          });
        });
      });
    </script>
  </header>

  <div class="layout">

    <aside class="sidebar" id="filterSidebar">
      <div class="sidebar-inner">
        <section class="filter-group">
          <p class="filter-eyebrow">01 &mdash; Tipo de carta</p>
          <div class="filter-field">
            <button type="button" id="supportedCardToggle" class="prompt">Cartas</button>
          </div>
        </section>  
        <script>
          document.addEventListener("DOMContentLoaded", function() {
            const toggleBtn = document.getElementById("supportedCardToggle");
            const descInput = document.getElementById("descInput");
            let isActive = false;

            function ensureSupportedCardPrefix(descVal) {
              // Removes existing prefix (case-insensitive, followed by space)
              let newVal = descVal.replace(/^supported card\s+/i, "");
              return "supported card " + newVal;
            }

            function removeSupportedCardPrefix(descVal) {
              // Removes only the "supported card " at start, case-insensitive, if present
              return descVal.replace(/^supported card\s+/i, "");
            }

            toggleBtn.addEventListener("click", function() {
              isActive = !isActive;

              if (isActive) {
                // Prepend "supported card " only if not already present
                descInput.value = ensureSupportedCardPrefix(descInput.value);
                toggleBtn.classList.add("prompt-active");
                toggleBtn.textContent = "Support";
              } else {
                // Remove only the "supported card " part if present, leave rest as is
                descInput.value = removeSupportedCardPrefix(descInput.value);
                toggleBtn.classList.remove("prompt-active");
                toggleBtn.textContent = "Cartas";
              }

              // Trigger Enter key to activate the query
              const event = new KeyboardEvent('keydown', {
                key: 'Enter',
                code: 'Enter',
                which: 13,
                keyCode: 13,
                bubbles: true
              });
              descInput.dispatchEvent(event);
            });
          });
        </script>
        <style>
          /* Optional: visually show active toggle */
          .prompt-active {
            background: var(--brass);
            color: var(--panel);
            border-color: var(--brass);
          }
        </style>
        <section class="filter-group">
          <p class="filter-eyebrow">01 &mdash; Identidad</p>
          <label class="filter-field">
            <span>Nombre de carta</span>
            <input id="nameInput" type="text" placeholder="Ej. Aria, Sombraluz...">
          </label>
          <label class="filter-field">
            <span>Rol</span>
            <input id="roleInput" type="text" placeholder="Ej. Sanador, Tanque...">
          </label>
        </section>

        <section class="filter-group">
          <p class="filter-eyebrow">02 &mdash; Habilidad</p>
          <label class="filter-field">
            <span>Nombre de habilidad</span>
            <input id="abilityInput" type="text" placeholder="Ej. Golpe final...">
          </label>
          <label class="filter-field">
            <span>Descripción</span>
            <input id="descInput" type="text" placeholder="Palabra clave en el efecto...">
          </label>
        </section>

        <section class="filter-group">
          <p class="filter-eyebrow">03 &mdash; Estadísticas</p>
          <div class="filter-row">
            <label class="filter-field">
              <span>Rating</span>
              <select id="ratingInput" onchange="searchCards()">
                <option value="">0</option>
                <option value="0/10">0</option>
                <option value="1/10">1</option>
                <option value="2/10">2</option>
                <option value="3/10">3</option>
                <option value="4/10">4</option>
                <option value="5/10">5</option>
                <option value="6/10">6</option>
                <option value="7/10">7</option>
                <option value="8/10">8</option>
                <option value="9/10">9</option>
                <option value="10/10">10</option>
              </select>
            </label>
            <label class="filter-field">
              <span>Revive</span>
              <select id="reviveInput" onchange="searchCards()">
                <option value="">--</option>
                <option value="Si">Sí</option>
                <option value="No">No</option>
              </select>
    
            </label>
          </div>
        </section>

        <section class="filter-group">
          <p class="filter-eyebrow">04 &mdash; Efectos de combate</p>
          <label class="filter-field">
            <span>Status effects</span>
            <input id="statusInput" type="text" placeholder="Ej. Aturdido...">
          </label>
          <label class="filter-field">
            <span>Debuffs</span>
            <input id="debuffsInput" type="text" placeholder="Ej. Defensa reducida...">
          </label>
          <label class="filter-field">
            <span>Counters</span>
            <input id="countersInput" type="text" placeholder="Ej. Contraataque...">
          </label>
          <label class="filter-field">
            <span>Buffs</span>
            <input id="buffsInput" type="text" placeholder="Ej. Ataque aumentado...">
          </label>
        </section>

        <div class="filter-actions">
          <button class="search-btn" onclick="searchCards()">
            Buscar cartas
          </button>
          <button class="clear-btn" id="clearFiltersBtn" type="button">
            Limpiar filtros
          </button>
        </div>
      </div>
    </aside>

    <main class="content">
      <div id="results"></div>
    </main>

  </div>

  <script>
    const toggle = document.getElementById('mobileFilterToggle');
    const sidebar = document.getElementById('filterSidebar');
    toggle.addEventListener('click', () => {
      const isOpen = sidebar.classList.toggle('is-open');
      toggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    });
  </script>
  <script src="logic.js"></script>
  <!-- Recuerda pegar tu ANON_KEY real en logic.js, la línea 2 -->
</body>
</html>
