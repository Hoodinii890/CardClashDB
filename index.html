<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Searcher</title>
  <link rel="icon" href="https://tr.rbxcdn.com/180DAY-ee9112b89b446581b34350573a3d6760/256/256/Image/Webp/noFilter" type="image/webp">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="topbar">
    <div class="topbar-mark">
      <span class="topbar-mark-glyph">&#9670;</span>
      <div>
        <h1>Card Explorer</h1>
        <p class="topbar-sub">Unit dossier &mdash; tactical search and filtering</p>
      </div>
    </div>
    <div style="display: flex; flex-direction: column; gap: 0.75rem;">
      <button class="mobile-filter-toggle" id="mobileFilterToggle" type="button" aria-expanded="false" aria-controls="filterSidebar">
        Filters
      </button>
    </div>
  </header>

  <div class="layout">

    <aside class="sidebar" id="filterSidebar">
      <div class="sidebar-inner">
        <section class="filter-group">
          <p class="filter-eyebrow">01 &mdash; Card type</p>
          <div class="filter-field">
            <button type="button" id="supportedCardToggle" class="prompt">Cards</button>
          </div>
        </section>  
        <script>
          document.addEventListener("DOMContentLoaded", function() {
            const toggleBtn = document.getElementById("supportedCardToggle");
            let isActive = false;

            toggleBtn.addEventListener("click", function() {
              isActive = !isActive;

              if (isActive) {
                toggleBtn.classList.add("prompt-active");
                toggleBtn.textContent = "Support";
              } else {
                toggleBtn.classList.remove("prompt-active");
                toggleBtn.textContent = "Cards";
              }

              // Activa la búsqueda sin modificar otros inputs
              if (typeof searchCards === "function") {
                searchCards();
              }
            });
          });
        </script>
        <style>
          /* Optional: visually show active toggle */
          .prompt-active {
            background: var(--brass);
            color: var(--panel);
            border-color: var(--brass);
          }
        </style>
        <section class="filter-group">
          <p class="filter-eyebrow">01 &mdash; Identity</p>
          <label class="filter-field">
            <span>Card name</span>
            <input id="nameInput" type="text" placeholder="E.g. Aria, Shadowlight...">
          </label>
          <label class="filter-field">
            <span>Role</span>
            <input id="roleInput" type="text" placeholder="E.g. Healer, Tank...">
          </label>
        </section>

        <section class="filter-group">
          <p class="filter-eyebrow">02 &mdash; Ability</p>
          <label class="filter-field">
            <span>Ability name</span>
            <input id="abilityInput" type="text" placeholder="E.g. Final Blow...">
          </label>
          <label class="filter-field">
            <span>Description</span>
            <input id="descInput" type="text" placeholder="Keyword in the effect...">
          </label>
        </section>

        <section class="filter-group">
          <p class="filter-eyebrow">03 &mdash; Stats</p>
          <div class="filter-row">
            <label class="filter-field">
              <span>Rating</span>
              <select id="ratingInput" onchange="searchCards()">
                <option value="">-</option>
                <option value="0">0</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10">10</option>
              </select>
            </label>
            <label class="filter-field">
              <span>Revive</span>
              <select id="reviveInput" onchange="searchCards()">
                <option value="">--</option>
                <option value="Si">Yes</option>
                <option value="No">No</option>
              </select>
    
            </label>
          </div>
        </section>

        <section class="filter-group">
          <p class="filter-eyebrow">04 &mdash; Combat effects</p>
          <label class="filter-field">
            <span>Status effects</span>
            <input id="statusInput" type="text" placeholder="E.g. Stunned...">
          </label>
          <label class="filter-field">
            <span>Debuffs</span>
            <input id="debuffsInput" type="text" placeholder="E.g. Reduced defense...">
          </label>
          <label class="filter-field">
            <span>Counters</span>
            <input id="countersInput" type="text" placeholder="E.g. Counterattack...">
          </label>
          <label class="filter-field">
            <span>Buffs</span>
            <input id="buffsInput" type="text" placeholder="E.g. Increased attack...">
          </label>
        </section>

        <div class="filter-actions">
          <button class="search-btn" onclick="searchCards()">
            Search cards
          </button>
          <button class="clear-btn" id="clearFiltersBtn" type="button">
            Clear filters
          </button>
        </div>
      </div>
    </aside>

    <main class="content">
      <div id="results"></div>
    </main>

  </div>

  <script>
    const toggle = document.getElementById('mobileFilterToggle');
    const sidebar = document.getElementById('filterSidebar');
    toggle.addEventListener('click', () => {
      const isOpen = sidebar.classList.toggle('is-open');
      toggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    });
  </script>
  <script src="logic.js"></script>
  <!-- Remember to paste your real ANON_KEY in logic.js, line 2 -->
</body>
</html>
